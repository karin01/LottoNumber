<!DOCTYPE html>
<html>
<head>
    <title>CSS 테스트</title>
</head>
<body style="background: red; color: white; font-size: 30px; padding: 50px;">
    <h1>이것이 빨간 배경에 흰 글씨로 보이나요?</h1>
    <div style="background: blue; padding: 20px; margin: 20px; border-radius: 10px;">
        <p>이 부분은 파란색 배경이어야 합니다!</p>
    </div>
    <div style="background: green; padding: 20px; margin: 20px; border-radius: 10px;">
        <p>이 부분은 초록색 배경이어야 합니다!</p>
    </div>
</body>
</html>
